name: Shopee Company Taiwan Automation

on:
  schedule:
    # 毎日 日本時間 8:00, 12:00, 16:00, 20:00 に自動起動 (UTC 23:00, 3:00, 7:00, 11:00)
    - cron: '0 23,3,7,11 * * *'
  workflow_dispatch:
    inputs:
      country:
        description: '対象国を選択してください (Select Country)'
        required: true
        default: 'TW'
        type: choice
        options:
          - 'TW'

jobs:
  run-shopee-operations:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 crewai

    # 📂 【迷子撃退機能】価格改定スクリプトの自動探索と実行
    - name: Run Shopee Engine (Auto-Locate)
      env:
        CANVA_CLIENT_ID: ${{ secrets.CANVA_CLIENT_ID }}
        CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
        AMAZON_API_KEY: ${{ secrets.AMAZON_API_KEY }}
        TARGET_COUNTRY: ${{ github.event.inputs.country || 'TW' }}
      run: |
        echo "=== 🚀 価格改定スクリプトの自動探索と実行を開始 ==="
        TARGET_FILE="pricing_engine_tw.py"
        FOUND_PATH=$(find . -name "$TARGET_FILE" -print -quit)
        
        if [ -z "$FOUND_PATH" ]; then
          echo "❌ エラー: リポジトリ内に $TARGET_FILE が見つかりません。"
          exit 1
        else
          echo "🎯 ファイルを発見しました: $FOUND_PATH"
          python "$FOUND_PATH"
        fi

    # ⚖️ 【情報収集】規約・重要マニュアル本文の自動一括スキャン
    - name: Run Shopee Info Crawler (Auto-Locate)
      run: |
        echo "=== ⚖️ 規約監視スクリプトの自動探索と実行を開始 ==="
        TARGET_FILE="info_crawler.py"
        FOUND_PATH=$(find . -name "$TARGET_FILE" -print -quit)
        
        if [ -z "$FOUND_PATH" ]; then
          echo "❌ エラー: リポジトリ内に $TARGET_FILE が見つかりません。"
          exit 1
        else
          echo "🎯 ファイルを発見しました: $FOUND_PATH"
          python "$FOUND_PATH"
        fi

    # 🧠 【AI要約】収集された規約データのAI自動分析・知識要約
    - name: Run Shopee Rule Analyser (Auto-Locate)
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        echo "=== 🧠 規約AI要約スクリプトの自動探索と実行を開始 ==="
        TARGET_FILE="shopee_rule_analyser.py"
        FOUND_PATH=$(find . -name "$TARGET_FILE" -print -quit)
        
        if [ -z "$FOUND_PATH" ]; then
          echo "❌ エラー: リポジトリ内に $TARGET_FILE が見つかりません。"
          exit 1
        else
          echo "🎯 ファイルを発見しました: $FOUND_PATH"
          # 前ステップで取得された生規約データをベースにAI分析を実行
          python "$FOUND_PATH"
        fi

    # 生成されたすべての成果物（CSV/画像/生規約/AI要約レポート）をまとめて回収してプッシュ
    - name: Commit and Push Shopee Assets
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        git config --local core.autocrlf false
        git config --local core.safecrlf false
        
        # すべてのoutputsフォルダを安全に追加
        if [ -d "outputs/shopee" ]; then
          git add -A outputs/shopee/
        fi
        
        if [ -d "outputs/shopee_rules" ]; then
          git add -A outputs/shopee_rules/
        fi
        
        git commit -m "📦 [Shopeeシステム] 最新価格CSV、画像、およびAI規約分析要約書を格納しました" || echo "変更なし"
        git push
