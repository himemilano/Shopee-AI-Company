name: Shopee Company Taiwan Automation

on:
  schedule:
    # 毎日 日本時間 8:00, 12:00, 16:00, 20:00 に自動起動 (UTC 23:00, 3:00, 7:00, 11:00)
    - cron: '0 23,3,7,11 * * *'
  workflow_dispatch:
    inputs:
      country:
        description: '対象国を選択してください (Select Country)'
        required: true
        default: 'TW'
        type: choice
        options:
          - 'TW'

jobs:
  run-shopee-operations:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 📂 【迷子撃退機能】リポジトリ内のどこにPythonファイルがあっても自動追跡して実行する仕組み
    - name: Run Shopee Engine (Auto-Locate)
      env:
        CANVA_CLIENT_ID: ${{ secrets.CANVA_CLIENT_ID }}
        CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
        AMAZON_API_KEY: ${{ secrets.AMAZON_API_KEY }}
        TARGET_COUNTRY: ${{ github.event.inputs.country || 'TW' }}
      run: |
        echo "=== 🚀 スクリプトの自動探索と実行を開始 ==="
        TARGET_FILE="pricing_engine_tw.py"
        FOUND_PATH=$(find . -name "$TARGET_FILE" -print -quit)
        
        if [ -z "$FOUND_PATH" ]; then
          echo "❌ エラー: リポジトリ内に $TARGET_FILE が見つかりません。ファイル名を確認してください。"
          exit 1
        else
          echo "🎯 ファイルを発見しました: $FOUND_PATH"
          python "$FOUND_PATH"
        fi

    # 生成された成果物を回収してGitHubに永久保存
    - name: Commit and Push Shopee Assets
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 成果物フォルダが存在する場合のみコミット処理を実行
        if [ -d "outputs/shopee" ]; then
          git add outputs/shopee/*
          git commit -m "📦 [Shopeeチーム] 台湾向け最新CSVおよびCanva画像を保管庫に格納しました" || echo "変更なし"
          git push
        else
          echo "⚠️ 成果物フォルダ outputs/shopee が生成されなかったため、プッシュをスキップします。"
        fi
