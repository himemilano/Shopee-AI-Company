name: Shopee Auto Creative Core

# ボタンを押すときに、すべての国から自由に選べるようにする設定
on:
  workflow_dispatch:
    inputs:
      target_country:
        description: '実行する国を選択してください (Select Country)'
        required: true
        default: 'singapore'
        type: choice
        options:
          - 'singapore'
          - 'taiwan'
          - 'malaysia'
          - 'philippines'
          - 'thailand'
          - 'vietnam'
          - 'brazil'

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      # 1. フォルダ内のファイルを読み込む
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. パソコン環境（Python）をセットアップする
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 必要な拡張機能（ライブラリ）をインストールする
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      # --------------------------------------------------
      # 各国ごとの自動実行処理（ファイルを自動探索して実行）
      # --------------------------------------------------

      # ① シンガポール (SG)
      - name: Run Singapore Engine
        if: ${{ github.event.inputs.target_country == 'singapore' }}
        env:
          CANVA_CLIENT_ID: ${{ secrets.CANVA_CLIENT_ID }}
          CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
          SHP_COUNTRY: 'SG'
        run: |
          TARGET_DIR=$(dirname $(find . -name "pricing_engine.py" | head -n 1))
          cd "$TARGET_DIR"
          python pricing_engine.py

      # ② 台湾 (TW) ※専用の台湾ファイルを実行
      - name: Run Taiwan Engine
        if: ${{ github.event.inputs.target_country == 'taiwan' }}
        env:
          CANVA_CLIENT_ID: ${{ secrets.CANVA_CLIENT_ID }}
          CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
          SHP_COUNTRY: 'TW'
        run: |
          TARGET_DIR=$(dirname $(find . -name "pricing_engine_tw.py" | head -n 1))
          cd "$TARGET_DIR"
          python pricing_engine_tw.py

      # ③ マレーシア (MY)
      - name: Run Malaysia Engine
        if: ${{ github.event.inputs.target_country == 'malaysia' }}
        env:
          CANVA_CLIENT_ID: ${{ secrets.CANVA_CLIENT_ID }}
          CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
          SHP_COUNTRY: 'MY'
        run: |
          TARGET_DIR=$(dirname $(find . -name "pricing_engine.py" | head -n 1))
          cd "$TARGET_DIR"
          python pricing_engine.py

      # ④ フィリピン (PH)
      - name: Run Philippines Engine
        if: ${{ github.event.inputs.target_country == 'philippines' }}
        env:
          CANVA_CLIENT_ID: ${{ secrets.CANVA_CLIENT_ID }}
          CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
          SHP_COUNTRY: 'PH'
        run: |
          TARGET_DIR=$(dirname $(find . -name "pricing_engine.py" | head -n 1))
          cd "$TARGET_DIR"
          python pricing_engine.py

      # ⑤ タイ (TH)
      - name: Run Thailand Engine
        if: ${{ github.event.inputs.target_country == 'thailand' }}
        env:
          CANVA_CLIENT_ID: ${{ secrets.CANVA_CLIENT_ID }}
          CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
          SHP_COUNTRY: 'TH'
        run: |
          TARGET_DIR=$(dirname $(find . -name "pricing_engine.py" | head -n 1))
          cd "$TARGET_DIR"
          python pricing_engine.py

      # ⑥ ベトナム (VN)
      - name: Run Vietnam Engine
        if: ${{ github.event.inputs.target_country == 'vietnam' }}
        env:
          CANVA_CLIENT_ID: ${{ secrets.CANVA_CLIENT_ID }}
          CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
          SHP_COUNTRY: 'VN'
        run: |
          TARGET_DIR=$(dirname $(find . -name "pricing_engine.py" | head -n 1))
          cd "$TARGET_DIR"
          python pricing_engine.py

      # ⑦ ブラジル (BR)
      - name: Run Brazil Engine
        if: ${{ github.event.inputs.target_country == 'brazil' }}
        env:
          CANVA_CLIENT_ID: ${{ secrets.CANVA_CLIENT_ID }}
          CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
          SHP_COUNTRY: 'BR'
        run: |
          TARGET_DIR=$(dirname $(find . -name "pricing_engine.py" | head -n 1))
          cd "$TARGET_DIR"
          python pricing_engine.py
