name: Shopee Company Taiwan Automation

on:
  schedule:
    # 毎日 日本時間 8:00, 12:00, 16:00, 20:00 に自動起動 (UTCでは前日23:00, 当日3:00, 7:00, 11:00)
    - cron: '0 23,3,7,11 * * *'
  workflow_dispatch: # 会長が手動でいつでも動かせるボタン

jobs:
  run-shopee-operations:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Shopee Engine
      env:
        CANVA_CLIENT_ID: ${{ secrets.CANVA_CLIENT_ID }}
        CANVA_CLIENT_SECRET: ${{ secrets.CANVA_CLIENT_SECRET }}
        AMAZON_API_KEY: ${{ secrets.AMAZON_API_KEY }}
      run: python pricing_engine_tw.py

    # 🔥 【新規実装】生成されたCSVと画像を回収してGitHubに永久保存するステップ
    - name: Commit and Push Shopee Assets
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add outputs/shopee/*
        git commit -m "📦 [Shopeeチーム] 台湾向け最新CSVおよびCanva画像を保管庫に格納しました" || echo "変更なし"
        git push
