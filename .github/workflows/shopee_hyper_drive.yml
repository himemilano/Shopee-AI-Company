name: 🛍️ Shopee AI Agent Hyper-Drive Loop

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
on:
  schedule:
    # 毎時0分に起動して常時コンテナを稼働
    - cron: '0 * * * *'
  workflow_dispatch: # 手動即時起動ボタン

permissions:
  contents: write # 監視ログや分析シートをGitHubへ自動コミットする権限

jobs:
  run-shopee-limitless:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # 最大実行時間（約6時間限界）

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    # 🛍️ Shopee価格・競合自動パトロール実行
    - name: Run Shopee Loop Agent
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_FX }}
      run: |
        echo "=== 🛍️ Shopee自律パトロールハイパードライブ 起動 ==="
        python shopee_bot/agents/shopee_loop_runner.py

