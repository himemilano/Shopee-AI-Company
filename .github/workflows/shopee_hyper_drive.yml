name: 🛍️ Shopee Patrol Hyper-Drive

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-shopee-limitless:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Shopee Loop Agent
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_FX }}
        API_KEY: ${{ secrets.GEMINI_API_KEY_FX }}
      run: |
        echo "=== 🛍️ Shopee自律パトロールハイパードライブ 起動 ==="
        # プログラムが探せるようにカレントディレクトリを移動して実行するか、正しいパスを指定します
        if [ -f "shopee_bot/agents/shopee_loop_runner.py" ]; then
          python shopee_bot/agents/shopee_loop_runner.py
        elif [ -f "shopee_loop_runner.py" ]; then
          python shopee_loop_runner.py
        else
          echo "⚠️ ランナーファイルが見つかりません。リポジトリ内のパスを確認してください。"
          find . -name "*shopee_loop_runner.py"
        fi


